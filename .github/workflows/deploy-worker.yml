name: Deploy Worker
on:
  push:
    branches: [main]
    paths:
      - 'nws-bot-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: nws-bot-worker
          command: deploy

      - name: Notify deploy success
        if: success()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN secret not set"
            exit 0
          fi
          # JSON — надёжная кодировка для кириллицы и эмодзи
          json='{"chat_id":1159166497,"text":"✅ Деплой NWS Worker прошёл успешно!"}'
          resp=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$json")
          http_code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Telegram API response (code=$http_code): $body"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Notification failed. Check BOT_TOKEN and chat_id."
          fi
