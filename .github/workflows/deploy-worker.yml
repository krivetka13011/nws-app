name: Deploy Worker
on:
  push:
    branches: [main]
    paths:
      - 'nws-bot-worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: nws-bot-worker
          command: deploy

      - name: Notify deploy success
        if: success()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          NOTIFY_CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN secret not set — добавьте в Settings → Secrets"
            exit 0
          fi
          CHAT_ID="${NOTIFY_CHAT_ID:-1159166497}"
          json="{\"chat_id\":\"$CHAT_ID\",\"text\":\"✅ Деплой NWS Worker прошёл успешно!\",\"parse_mode\":\"HTML\"}"
          resp=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$json")
          http_code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Telegram API response (code=$http_code): $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Уведомление не отправлено. Проверьте BOT_TOKEN и NOTIFY_CHAT_ID (или chat_id 1159166497). Ответ: $body"
          fi
